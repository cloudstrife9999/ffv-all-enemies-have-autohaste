name: Update Site
on:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Node + Yarn setup ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install --immutable

      - name: Build frontend
        run: yarn build

      # --- Build publish folder (flattened root) ---
      - name: Prepare publish directory
        run: |
          rm -rf publish
          mkdir publish

          # Copy root files
          cp index.html publish/

          # Copy static assets (exclude build-sri.mjs)
          rsync -av --exclude='js/build-sri.mjs' static/ publish/static/

          # Disable Jekyll so _data is not removed
          touch publish/.nojekyll

      # --- DEBUG list ---
      - name: List publish directory (debug)
        run: |
          echo "=== publish directory ==="
          find publish -maxdepth 4 -type f -print

      # --- Upload artifact for GitHub Pages ---
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
